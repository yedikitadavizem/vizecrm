const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1aGlqb2Z0cGdpeml4d3Rqd3BrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkzODg5NDgsImV4cCI6MjA2NDk2NDk0OH0.fWH8stLIPQ3RGjPomWUNtM3Dq_q5HsVz1ZHrFDjIgts';   // ← Supabase anon key buraya

const EDGE_FUNCTION_URL = 'https://huhijoftpgizixwtjwpk.supabase.co/functions/v1/bright-handler';

let supabaseClient = null;
let USE_SUPABASE = true; // Supabase bilgilerini girdikten sonra true yapın

// Edge Function üzerinden bağlantı
if (EDGE_FUNCTION_URL && !EDGE_FUNCTION_URL.includes('XXXXX')) {
  USE_SUPABASE = true;
  console.log('✅ Supabase bağlantısı aktif');
} else {
  console.log('⚠️ Edge Function URL girilmedi');
}

// ============================================
// SUPABASE VERİ FONKSİYONLARI
// ============================================

// Tüm müşterileri çek
async function fetchCustomers() {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('customers')
    .select('*, sales_rep:users!sales_rep_id(name), ops_user:users!ops_id(name)')
    .order('created_at', { ascending: false });
  if (error) { console.error('fetchCustomers:', error); return null; }
  return data;
}

// Müşteri güncelle (status, ödeme vs.)
async function updateCustomer(id, updates) {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('customers')
    .update(updates)
    .eq('id', id)
    .select();
  if (error) { console.error('updateCustomer:', error); return null; }
  return data;
}

// Yeni müşteri ekle
async function insertCustomer(customer) {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('customers')
    .insert([customer])
    .select();
  if (error) { console.error('insertCustomer:', error); return null; }
  return data;
}

// Not ekle
async function insertNote(customerId, content, authorName) {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('notes')
    .insert([{ customer_id: customerId, content, author_name: authorName }]);
  if (error) { console.error('insertNote:', error); return null; }
  return data;
}

// Arama kaydı ekle
async function insertCallLog(customerId, result, note, callerName) {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('call_logs')
    .insert([{ customer_id: customerId, result, note, caller_name: callerName }]);
  if (error) { console.error('insertCallLog:', error); return null; }
  return data;
}

// Status geçmişi ekle
async function insertStatusHistory(customerId, fromStatus, toStatus, changedByName) {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('status_history')
    .insert([{ customer_id: customerId, from_status: fromStatus, to_status: toStatus }]);
  if (error) { console.error('insertStatusHistory:', error); return null; }
  return data;
}

// Kullanıcı girişi - Edge Function üzerinden
async function signInUser(username, password) {
  try {
    const res = await fetch(EDGE_FUNCTION_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', username, password })
    });
    const data = await res.json();
    if (!res.ok || data.error) return null;
    return data;  // { user, token }
  } catch(e) {
    console.error('Edge Function login hatası:', e);
    return null;
  }
}

// Şifre güncelle
async function updatePassword(userId, newPassword) {
  if (!USE_SUPABASE) return false;
  const { error } = await supabaseClient
    .from('users')
    .update({ password_hash: newPassword })
    .eq('id', userId);
  return !error;
}

// Kullanıcı adı güncelle
async function updateUsername(userId, newUsername) {
  if (!USE_SUPABASE) return false;
  const { error } = await supabaseClient
    .from('users')
    .update({ username: newUsername })
    .eq('id', userId);
  return !error;
}

// Ad güncelle
async function updateDisplayName(userId, newName) {
  if (!USE_SUPABASE) return false;
  const { error } = await supabaseClient
    .from('users')
    .update({ name: newName, rep_name: newName })
    .eq('id', userId);
  return !error;
}

// Gerçek zamanlı müşteri güncellemeleri dinle
function subscribeToCustomers(callback) {
  if (!USE_SUPABASE) return;
  supabaseClient
    .channel('customers')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'customers' }, callback)
    .subscribe();
}
</script>

.pi-cur{background:var(--accent-l);color:var(--accent);font-weight:700}
.pi-pend{background:var(--bg);color:var(--text3);border:1px solid var(--border)}
.pl-done{color:var(--text3);text-decoration:line-through}
.pl-cur{color:var(--accent);font-weight:600}
.pl-pend{color:var(--text3)}

/* ===== PAYMENT ===== */
.pay-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.pay-row:last-child{border-bottom:none}
.pay-lbl{font-size:12px;color:var(--text2)}
.pay-val{font-size:14px;font-weight:700}
.pbadge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.pb-ok{background:var(--green-bg);color:var(--green)}
.pb-pend{background:var(--amber-bg);color:var(--amber)}

/* ===== NOTES & CALLS ===== */
.note-item{background:#FFFBEB;border-left:3px solid var(--amber);padding:10px 12px;border-radius:0 7px 7px 0;margin-bottom:8px}
.note-item:last-child{margin-bottom:0}
.note-text{font-size:12px;color:var(--text);line-height:1.5}
.note-meta{font-size:10px;color:var(--text3);margin-top:4px}
.call-item{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.call-item:last-child{border-bottom:none}
.call-num{width:22px;height:22px;border-radius:50%;background:var(--accent-l);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}

/* ===== TIMELINE ===== */
.tl-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:4px;flex-shrink:0}
.tl-label{font-size:12px;color:var(--text);font-weight:500}
.tl-meta{font-size:10px;color:var(--text3);margin-top:2px}

/* ===== MODAL ===== */
.modal{display:none;position:fixed;inset:0;z-index:300;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(2px)}
.modal-box{position:relative;background:#fff;border:1px solid var(--border);border-radius:14px;padding:28px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:20px;letter-spacing:-.2px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{margin-bottom:14px}
.fl2{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em}
.fi2{width:100%;padding:8px 11px;background:#fff;border:1px solid var(--border2);border-radius:7px;font-size:13px;color:var(--text);outline:none;transition:all .12s;font-family:inherit}
.fi2:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.fi2::placeholder{color:var(--text3)}
textarea.fi2{resize:vertical}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ===== QUICK STATUS ===== */
.qs-btn{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:#fff;color:var(--text2);transition:all .12s;font-family:inherit}
.qs-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l)}
.qs-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-l)}

/* ===== CHARTS ===== */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.chart-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px}
.chart-title{font-size:13px;font-weight:600;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-lbl{font-size:11px;color:var(--text2);min-width:82px;text-align:right}
.bar-track{flex:1;background:var(--bg);border-radius:4px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-val{font-size:11px;color:var(--text3);min-width:48px}

/* ===== USER CARDS ===== */
.user-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.user-card:hover{border-color:var(--border2)}

/* ===== ACCOUNT ===== */
.acc-sec{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px}
.acc-title{font-size:14px;font-weight:700;margin-bottom:3px}
.acc-sub{font-size:12px;color:var(--text2);margin-bottom:14px}

/* ===== ALERT ===== */
.alert{border-radius:10px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px}
.alert-red{background:#FEF2F2;border:1px solid #FECACA}

/* ===== TOAST ===== */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:1000;display:flex;flex-direction:column;gap:8px}

@media(max-width:900px){.stats-grid,.stats-grid-5{grid-template-columns:repeat(2,1fr)}.charts-grid{grid-template-columns:1fr}}

<script>
// Local USERS sadece Supabase bağlantısı olmadığında kullanılır
const USERS=[];
let CU=null;

const STAGES=['Yeni Kayıt','Sonra Ara','Ulaşılamıyor','İlgileniyor','İlgilenmiyor','İletişime Geçildi','Ödeme Alındı','Belge Bekleniyor','Belgeler Tamam','Randevu Aranıyor','Randevu Alındı','Randevu Evrakları Hazırlanıyor','Randevu Evrakları Tamamlandı','Başvuru Yapıldı','Sonuç Bekleniyor','Tamamlandı','İptal'];
const SCLS={'Yeni Kayıt':'b-lead','Sonra Ara':'b-callback','Ulaşılamıyor':'b-unreachable','İlgileniyor':'b-interested','İlgilenmiyor':'b-notinterested','İletişime Geçildi':'b-contacted','Ödeme Alındı':'b-payment','Belge Bekleniyor':'b-docs-pending','Belgeler Tamam':'b-docs-done','Randevu Aranıyor':'b-appt-search','Randevu Alındı':'b-appt-sched','Randevu Evrakları Hazırlanıyor':'b-docs-pending','Randevu Evrakları Tamamlandı':'b-docs-done','Başvuru Yapıldı':'b-submitted','Sonuç Bekleniyor':'b-waiting','Tamamlandı':'b-completed','İptal':'b-cancelled'};
const MONTHS=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
function repColorHash(name){if(!name||name==='—')return'#2563EB';const cols=['#2563EB','#D97706','#059669','#DC2626','#0891B2','#7C3AED','#0D9488','#DB2777','#EA580C','#65A30D'];let h=0;for(let i=0;i<name.length;i++)h=name.charCodeAt(i)+((h<<5)-h);return cols[Math.abs(h)%cols.length];}
// Notlar ve aramalar artık customer_notes / customer_calls tablolarından geliyor

let customers=[];
let filtered=[];
let tableSort={col:'',dir:'asc'};
let tableRepFilter='';
let tableColSearch='';
let panelReadOnly=false;
let panelSalesView=false;
let panelPayments=[];
let panelCustExpenses=[];
let allCustExpenses=[];
let panelApps=[];
let expandedRows=new Set();
let addingCustomer=false;
let bulkSelected=new Set();

// Dışarıdan (Google Form vb.) gelen serbest metinleri HTML'e basmadan önce temizler — XSS koruması
function esc(str){
  if(str===null||str===undefined)return '';
  return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function fmtDT(iso){
  if(!iso)return'—';
  const d=new Date(iso);
  return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

async function loadCustomers(){
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'getCustomers',token:CU.token})});
    const data=await res.json();
    const rows=data.customers||[];
    customers=rows.map(r=>({
      id:r.file_number,name:esc(r.full_name),phone:esc(r.phone),email:esc(r.email),country:esc(r.country),
      visa:esc(r.visa_type),rep:r.rep_name||'—',ops:'',source:r.source||'manual',
      evrakRep:r.evrak_rep_name||'',randevuRep:r.randevu_rep_name||'',
      status:r.status,fee:r.service_fee||0,prepay:r.prepayment||0,
      days:r.last_modified_at?Math.max(0,Math.floor((Date.now()-new Date(r.last_modified_at).getTime())/86400000)):0,
      lastMod:fmtDT(r.last_modified_at),
      created:r.created_at||null,registrationDate:r.registration_date||'',lastModRaw:r.last_modified_at||null,
      apptDate:r.appt_date||'',apptTime:r.appt_time||'',apptCenter:r.appt_center||'',
      desiredApptDate:r.desired_appt_date||'',confirmedApptDate:r.confirmed_appt_date||'',
      visaStartDate:r.visa_start_date||'',visaEndDate:r.visa_end_date||'',visaRenewal:r.visa_renewal||false,
      tc:r.tc_kimlik||'',
      lastModBy:r.last_modified_by||'',
      paymentDate:r.payment_date||'',
      refundStatus:r.refund_status||'',refundAmount:r.refund_amount||0,refundReason:r.refund_reason||'',refundDate:r.refund_date||'',
      refundRequestedBy:r.refund_requested_by||'',refundRequestedAt:r.refund_requested_at||null,
      callTotal:r.call_total||0,callReached:r.call_reached||0,reminderDate:r.call_reminder_date||'',appTotal:r.app_total||0,appPending:r.app_pending||0,appPendingNoDate:r.app_pending_no_date||0,appPendingData:JSON.parse(r.app_pending_data||'[]')
    }));
    filtered=[...customers];
  }catch(e){
    console.error('loadCustomers hatası:',e);
    customers=[];filtered=[];
  }
}


function getTodayStr(){return new Date().toISOString().slice(0,10);}

function getReminderCount(){
  var t=getTodayStr();
  return customers.filter(function(c){return c.reminderDate===t;}).length;
}

function renderReminderBanner(list){
  if(!list.length) return '';
  var names=list.map(function(c){return '<b>'+c.name+'</b>';}).join(', ');
  var btns=list.map(function(c){
    return '<button class="btn btn-primary btn-sm" onclick="openPanel(\''+c.id+'\')">' + c.name.split(' ')[0] + '</button>';
  }).join('');
  return '<div style="background:var(--amber-bg);border:1px solid var(--amber);border-radius:10px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">'
    +'<div style="display:flex;align-items:center;gap:10px">'
    +'<span style="font-size:18px">&#x1F514;</span>'
    +'<div><div style="font-weight:700;color:var(--amber);font-size:13px">Bugün Aranacak '+list.length+' Müşteri</div>'
    +'<div style="font-size:11px;color:var(--text2);margin-top:2px">'+names+'</div></div></div>'
    +'<div style="display:flex;gap:6px">'+btns+'</div></div>';
}

function renderReminderPanel(c, readonly){
  if(readonly) return '';
  if(CU.role!=='management'&&CU.role!=='sales') return '';
  var d=c.reminderDate||'';
  var label=d?('<span style="font-size:11px;color:var(--amber);font-weight:600">'+fmtDate(d)+'</span>')
              :'<span style="font-size:11px;color:var(--text3)">Ayarlanmadı</span>';
  var html='<div class="ps">'
    +'<div class="ps-head"><div class="ps-title">&#x1F514; Hatırlatıcı</div>'+label+'</div>'
    +'<div style="display:flex;align-items:center;gap:8px;padding:8px 0">'
    +'<input type="date" id="rem-date-'+c.id+'" class="fi2" value="'+d+'" style="padding:6px 8px;font-size:12px">'
    +'<button class="btn btn-primary btn-sm" onclick="setReminder(\''+c.id+'\',document.getElementById(\'rem-date-'+c.id+'\').value)">&#10003; Kaydet</button>'
    +(d?'<button class="btn btn-ghost btn-sm" onclick="setReminder(\''+c.id+'\',null)">&#10005; Kaldır</button>':'')
    +'</div></div>';
  return html;
}

async function setReminder(custId, date){
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'setReminder',customerId:custId,reminderDate:date||null,token:CU.token})});
    const d=await res.json();
    if(!d.success){toast('Hatırlatıcı kaydedilemedi','red');return;}
    await loadCustomers();
    renderRows();
    if(document.querySelector('[id^="panel-"]')) await openPanel(custId);
    toast(date?('&#x1F514; '+fmtDate(date)+' tarihinde aranacak'):'Hatırlatıcı kaldırıldı',date?'green':'amber');
  }catch(e){toast('Bağlantı hatası','red');}
}

async function loadAllPayments(){

function getTableData(){
  let data=[...filtered];
  if(tableColSearch){
    const sq=tableColSearch.toLowerCase();
    data=data.filter(c=>
      (c.name&&c.name.toLowerCase().includes(sq))||
      (c.id&&c.id.toLowerCase().includes(sq))||
      (c.phone&&c.phone.includes(sq))
    );
  }
  if(tableRepFilter) data=data.filter(c=>{
    const extra=getCurrentHandler(c);
    return c.rep===tableRepFilter || (extra && extra.name===tableRepFilter);
  });
  if(tableSort.col){
    const d=tableSort.dir==='asc'?1:-1;
    data.sort((a,b)=>{
      switch(tableSort.col){
        case 'name': return d*(a.name||'').localeCompare(b.name||'','tr');
        case 'payment': return d*(((a.fee||0)-(a.prepay||0))-(((b.fee||0)-(b.prepay||0))));
        case 'date': return d*((a.lastModRaw?new Date(a.lastModRaw).getTime():0)-(b.lastModRaw?new Date(b.lastModRaw).getTime():0));
        case 'calls': return d*((a.callTotal||0)-(b.callTotal||0));
        case 'appt': return d*((a.apptDate?new Date(a.apptDate).getTime():0)-(b.apptDate?new Date(b.apptDate).getTime():0));
        default: return 0;
      }
    });
  }
  return data;
}

let dashPeriod='all', dashRep='', dashCountry='', dashDateFrom='', dashDateTo='';
const DASH_PERIODS=[['all','Tüm Zamanlar'],['today','Bugün'],['week','Bu Hafta'],['month','Bu Ay'],['quarter','Bu Çeyrek'],['year','Bu Yıl'],...[["2026-01","Ocak 2026"],["2026-02","Şubat 2026"],["2026-03","Mart 2026"],["2026-04","Nisan 2026"],["2026-05","Mayıs 2026"],["2026-06","Haziran 2026"],["2026-07","Temmuz 2026"],["2026-08","Ağustos 2026"],["2026-09","Eylül 2026"],["2026-10","Ekim 2026"],["2026-11","Kasım 2026"],["2026-12","Aralık 2026"]]];

function inDashPeriod(c,period){
  // Kayıt tarihi (registration_date) varsa onu kullan, yoksa created_at'e düş
  // Güncelleme tarihine bakma — "Bu Ay" = bu ay kayıt olan müşteriler
  const effDate = c.registrationDate || c.created;
  if(period==='custom'){
    if(!effDate)return false;
    const d=new Date(effDate);
    if(dashDateFrom){const f=new Date(dashDateFrom);f.setHours(0,0,0,0);if(d<f)return false;}
    if(dashDateTo){const t=new Date(dashDateTo);t.setHours(23,59,59,999);if(d>t)return false;}
    return true;
  }
  if(period==='all')return true;
  if(!effDate)return false;
  const d=new Date(effDate),now=new Date();
  if(period==='today')return d.toDateString()===now.toDateString();
  if(period==='week'){
    const dow=now.getDay(); const diffToMon=dow===0?6:dow-1;
    const start=new Date(now); start.setDate(now.getDate()-diffToMon); start.setHours(0,0,0,0);
    return d>=start;
  }
  if(period==='month')return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  if(period==='quarter')return d.getFullYear()===now.getFullYear()&&Math.floor(d.getMonth()/3)===Math.floor(now.getMonth()/3);
  if(period==='year')return d.getFullYear()===now.getFullYear();
  if(/^\d{4}-\d{2}$/.test(period)){const[y,m]=period.split('-').map(Number);return d.getFullYear()===y&&d.getMonth()===m-1;}
  return true;
}
function getDashFiltered(){
  return customers.filter(c=>inDashPeriod(c,dashPeriod)&&(!dashRep||c.rep===dashRep)&&(!dashCountry||c.country===dashCountry));
}

    if(dashDateTo){const t=new Date(dashDateTo);t.setHours(23,59,59,999);if(d>t)return false;}
    return true;
  }
  if(period==='all')return true;
  if(!effDate)return false;
  const d=new Date(effDate),now=new Date();
  if(period==='today')return d.toDateString()===now.toDateString();
  if(period==='week'){
    const dow=now.getDay(); const diffToMon=dow===0?6:dow-1;
    const start=new Date(now); start.setDate(now.getDate()-diffToMon); start.setHours(0,0,0,0);
    return d>=start;
  }
  if(period==='month')return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  if(period==='quarter')return d.getFullYear()===now.getFullYear()&&Math.floor(d.getMonth()/3)===Math.floor(now.getMonth()/3);
  if(period==='year')return d.getFullYear()===now.getFullYear();
  if(/^\d{4}-\d{2}$/.test(period)){const[y,m]=period.split('-').map(Number);return d.getFullYear()===y&&d.getMonth()===m-1;}

}

function showAllCustomersDetail(){
  const all=getDashFiltered();
  let searchQ='', regFrom='', regTo='', byUser='', byRep='';
  const updaters=[...new Set(all.map(c=>c.lastModBy).filter(Boolean))].sort();
  const reps=[...new Set(all.map(c=>c.rep).filter(r=>r&&r!=='—'))].sort();
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.onclick=e=>{if(e.target===modal)modal.remove();};

  function getFilteredList(){
    const q=searchQ.toLowerCase();
    return all.filter(c=>{
      if(q&&!((c.name||'').toLowerCase().includes(q)||(c.id||'').toLowerCase().includes(q)||(c.phone||'').includes(q)))return false;
      const regDate=(c.registrationDate||c.created||'').slice(0,10);
      if(regFrom&&(!regDate||regDate<regFrom))return false;
      if(regTo&&(!regDate||regDate>regTo))return false;
      if(byUser&&c.lastModBy!==byUser)return false;
      if(byRep&&c.rep!==byRep)return false;
      return true;
    });
  }

  function renderList(){
    const list=getFilteredList().sort((a,b)=>{
      const aT=a.lastModRaw||a.created||'';
      const bT=b.lastModRaw||b.created||'';
      return bT.localeCompare(aT);
    });
    const countEl=document.getElementById('all-cust-count');
    if(countEl)countEl.textContent=list.length+' müşteri';
    return list.map(c=>{
      const rem=(c.fee||0)-(c.prepay||0);
      return `<tr onclick="this.closest('div[style*=fixed]').remove();openPanel('${c.id}')" style="cursor:pointer;border-bottom:1px solid var(--border)" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">

        <td style="padding:9px 14px;color:var(--text2)">${c.country||'—'}</td>
        <td style="padding:9px 14px"><span class="badge ${SCLS[c.status]||'b-lead'}" style="font-size:10px">${c.status}</span></td>
        <td style="padding:9px 14px;color:var(--text2)">${c.rep||'—'}</td>
        <td style="padding:9px 14px;text-align:right;color:${rem<=0?'var(--green)':'var(--amber)'};font-weight:600">${(c.fee>0&&rem<=0)?'✓ Tam':(c.fee<=0?'—':'₺'+rem.toLocaleString('tr-TR'))}</td>
        <td style="padding:9px 14px;font-size:11px;color:var(--text3)">${c.created?fmtDT(c.created):'—'}</td>
        <td style="padding:9px 14px;font-size:11px;color:var(--text3)">
          ${c.lastModBy
            ? `<div style="color:var(--text);font-weight:500">${c.lastModBy}</div><div style="color:var(--text3);font-size:10px">${c.lastMod||''}</div>`
            : (c.lastModRaw ? `<div style="color:var(--text3)">${fmtDT(c.lastModRaw)}</div><div style="font-size:10px;color:var(--text3);opacity:0.6">bilinmiyor</div>` : '—')
          }
        </td>
      </tr>`;
    }).join('');
  }

  modal.innerHTML=`
    <div style="background:var(--bg);border-radius:16px;width:100%;max-width:980px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.3)">
      <div style="padding:18px 24px;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div>
            <div style="font-size:16px;font-weight:700;color:var(--text)">📋 Tüm Müşteriler</div>
            <div id="all-cust-count" style="font-size:13px;color:var(--accent);font-weight:600;margin-top:2px">${all.length} müşteri</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn btn-ghost btn-sm" onclick="exportAllCustomersExcel()">📥 Excel</button>
            <button onclick="this.closest('div[style*=fixed]').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3)">✕</button>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <input id="all-cust-search" type="text" placeholder="İsim, telefon, dosya no..." style="padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;width:180px">
          <div style="display:flex;align-items:center;gap:4px">
            <label style="font-size:10px;color:var(--text3)">Kayıt:</label>
            <input id="all-cust-from" type="date" style="padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:11px">
            <span style="font-size:11px;color:var(--text3)">—</span>

              <th style="padding:9px 14px;text-align:left;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)">Dosya No</th>
              <th style="padding:9px 14px;text-align:left;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)">Müşteri</th>
              <th style="padding:9px 14px;text-align:left;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)">Ülke</th>
              <th style="padding:9px 14px;text-align:left;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)">Aşama</th>
              <th style="padding:9px 14px;text-align:left;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)">Satış Temsilcisi</th>
              <th style="padding:9px 14px;text-align:right;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)">Ödeme</th>
              <th style="padding:9px 14px;text-align:left;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)">Kayıt Tarihi</th>
              <th style="padding:9px 14px;text-align:left;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)">Son Güncelleyen</th>
            </tr>
          </thead>
          <tbody id="all-cust-tbody">${renderList()}</tbody>
        </table>
      </div>
    </div>`;
  document.body.appendChild(modal);
  document.getElementById('all-cust-count').textContent=getFilteredList().length+' müşteri';

  document.getElementById('all-cust-from').onchange=function(){regFrom=this.value;document.getElementById('all-cust-tbody').innerHTML=renderList();};

  document.getElementById('all-cust-user').onchange=function(){byUser=this.value;document.getElementById('all-cust-tbody').innerHTML=renderList();};
  document.getElementById('all-cust-rep').onchange=function(){byRep=this.value;document.getElementById('all-cust-tbody').innerHTML=renderList();};
  document.getElementById('all-cust-reset').onclick=function(){
    searchQ='';regFrom='';regTo='';byUser='';byRep='';

    document.getElementById('all-cust-to').value='';
    document.getElementById('all-cust-user').value='';
    document.getElementById('all-cust-rep').value='';

function exportAllCustomersExcel(){
  const all=getDashFiltered();
  if(all.length===0){toast('Dışa aktarılacak müşteri yok','red');return;}
  const headers=['Dosya No','Ad Soyad','Telefon','E-posta','Ülke','Vize Türü','Aşama','Satış Temsilcisi','Evrak Sorumlusu','Randevu Sorumlusu','Toplam Ücret (₺)','Ön Ödeme (₺)','Kalan (₺)','Kayıt Tarihi','Son Güncelleme','Son Güncelleyen'];
  const rows=all.map(c=>{
    const rem=(c.fee||0)-(c.prepay||0);
    return [c.id,c.name,c.phone,c.email||'',c.country,c.visa,c.status,c.rep||'—',c.evrakRep||'—',c.randevuRep||'—',c.fee||0,c.prepay||0,rem>0?rem:0,c.created||'',c.lastMod||'',c.lastModBy||'—'];
  });
  const data=[headers,...rows];
  const ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:16},{wch:22},{wch:14},{wch:25},{wch:14},{wch:18},{wch:22},{wch:18},{wch:18},{wch:18},{wch:14},{wch:14},{wch:14},{wch:18},{wch:18},{wch:18}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Tüm Müşteriler');
  XLSX.writeFile(wb,`tum-musteriler-${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('✓ Excel indirildi ('+all.length+' müşteri)','green');
}

// ---- ORTALAMA SATIŞ SÜRESİ ----
function avgSalesCycleDays(list){
  const done=list.filter(c=>c.status==='Tamamlandı'&&c.created&&c.lastModRaw);
  if(!done.length)return null;
  const total=done.reduce((s,c)=>s+Math.max(0,(new Date(c.lastModRaw).getTime()-new Date(c.created).getTime())/86400000),0);
  return {avg:Math.round(total/done.length),count:done.length};
}

function buildWarningsHTML(){
  const warnings=[];
  for(const c of customers){
    if(c.status==='Tamamlandı'||c.status==='İptal') continue;
    const d=c.days;
    if(WARN_SALES_S.includes(c.status)){
      if(d>=3) warnings.push({level:'crit',c,msg:`${d} gündür güncellenmedi`,dept:'Satış',icon:'🔴'});
      else if(d>=2) warnings.push({level:'warn',c,msg:`${d} gündür güncellenmedi`,dept:'Satış',icon:'⚠️'});
    } else if(WARN_EVRAK_S.includes(c.status)){
      if(c.status==='Randevu Aranıyor'&&d>=14) warnings.push({level:'crit',c,msg:`${d} gündür randevu alınamıyor`,dept:'Evrak',icon:'🔴'});
      else if(d>=14) warnings.push({level:'crit',c,msg:`${d} gündür güncellenmedi`,dept:'Evrak',icon:'🔴'});
      else if(d>=7) warnings.push({level:'warn',c,msg:`${d} gündür güncellenmedi`,dept:'Evrak',icon:'⚠️'});
    } else if(WARN_RANDEVU_S.includes(c.status)){
      if(d>=14) warnings.push({level:'crit',c,msg:`${d} gündür güncellenmedi`,dept:'Randevu',icon:'🔴'});
      else if(d>=7) warnings.push({level:'warn',c,msg:`${d} gündür güncellenmedi`,dept:'Randevu',icon:'⚠️'});
    } else if(CONSULATE_WAIT_S.includes(c.status)){

    }
  }
  warnings.sort((a,b)=>{
    if(a.level!==b.level) return a.level==='crit'?-1:1;
    return b.c.days-a.c.days;
  });
  if(!warnings.length) return `

    </div>
  </div>`:''}
  `;
  const crits=warnings.filter(w=>w.level==='crit');
  const warns=warnings.filter(w=>w.level==='warn');

      </div>
    </div>
    ${warnings.map(w=>`

function funnelHTML(list){
  const nonCancelled=list.filter(c=>c.status!=='İptal');
  const counts=FUNNEL_STAGES.map(stage=>{
    const idx=STAGES.indexOf(stage);
    return nonCancelled.filter(c=>STAGES.indexOf(c.status)>=idx).length;
  });
  const top=counts[0]||0;
  const cancelledCount=list.filter(c=>c.status==='İptal').length;
  if(!list.length)return `<div class="chart-card"><div class="chart-title">Dönüşüm Hunisi</div><div style="font-size:12px;color:var(--text3);padding:8px 0">Henüz veri yok</div></div>`;
  return `<div class="chart-card" style="margin-bottom:20px">
    <div class="chart-title">Dönüşüm Hunisi <span style="font-weight:400;color:var(--text3);font-size:11px">— "Yeni Kayıt"tan en az bu aşamaya ulaşmış müşteri sayısı</span></div>
    ${FUNNEL_STAGES.map((stage,i)=>{
      const c=counts[i],pct=top?Math.round(c/top*100):0,w=top?Math.max(10,pct):10;
      return `<div class="bar-row"><div class="bar-lbl" style="min-width:130px;text-align:left">${stage}</div><div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${FUNNEL_COLORS[i]}"></div></div><div class="bar-val" style="min-width:70px">${c} (%${pct})</div></div>`;
    }).join('')}
    ${cancelledCount?`<div style="font-size:11px;color:var(--red);margin-top:6px">↳ ${cancelledCount} müşteri süreç içinde iptal oldu</div>`:''}
  </div>`;
}

function renderRows(){
  const list=getTableData();
  const cc=document.getElementById('cust-count'),tb=document.getElementById('cust-tbody');
  if(!cc||!tb)return;
  cc.textContent=list.length+' Müşteri';
  if(!list.length){tb.innerHTML='<tr><td colspan="'+(CU.role==="management"?'11':'10')+'" style="text-align:center;padding:48px;color:var(--text3)">Müşteri bulunamadı</td></tr>';return;}
  tb.innerHTML=list.map(c=>{
    const rem=c.fee-c.prepay;
    const stale=c.days>7;
    const hasRem=c.reminderDate===getTodayStr();
    return `<tr onclick="if(!event.target.closest('.app-badge'))openPanel('${c.id}')" style="${hasRem?'background:rgba(251,191,36,0.1);':''}">
      ${CU.role==='management'?'<td onclick="event.stopPropagation()"><input type="checkbox" class="bulk-cb" data-id="'+c.id+'" '+(bulkSelected.has(c.id)?'checked':'')+' onchange="toggleBulkSelect(this)" style="cursor:pointer;width:16px;height:16px"></td>':''}
      <td style="font-family:monospace;font-size:11px;color:var(--text3)">${c.id}</td>
      <td>${hasRem?'<span title="Bugün aranacak" style="font-size:12px;margin-right:2px">🔔</span>':''}<b>${c.name}</b>${stale?` <span style="font-size:9px;background:var(--red-bg);color:var(--red);border-radius:4px;padding:1px 5px">${c.days}g</span>`:''}</td>
      <td><a class="phone-link" href="tel:${c.phone}" onclick="event.stopPropagation()">${c.phone}</a></td>
      <td>${c.country}</td>
      <td><span class="badge ${SCLS[c.status]||'b-lead'}">${c.status}</span>${c.visaRenewal?'<span style="font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;background:#FEF3C7;color:#D97706;margin-left:4px">🔔 Vize Yenileme</span>':''}</td>
      <td>${c.callTotal===0?'<span style="color:var(--text3)">—</span>':`<span style="color:var(--accent);font-weight:700;font-size:12px">📞${c.callTotal}</span><span style="color:var(--green);font-size:10px;margin-left:4px">${c.callReached}✓</span>`}</td>
      <td style="font-size:11px">${c.apptDate?'<span style="color:var(--accent)">📅 '+fmtDate(c.apptDate)+'</span>':'<span style="color:var(--text3)">—</span>'}${c.appPending>0?'<div class="app-badge" onclick="toggleExpandRow(\''+c.id+'\')" style="background:var(--amber-bg);color:var(--amber);font-size:9px;font-weight:700;padding:2px 8px;border-radius:8px;margin-top:2px;white-space:nowrap;cursor:pointer">⚠️ '+c.appPending+' bekliyor '+(expandedRows.has(c.id)?'▲':'▼')+'</div>':''}</td>
      <td style="font-size:11px;color:${(c.prepay>0&&rem<=0)?'var(--green)':(c.prepay<=0?'var(--text3)':'var(--amber)')};font-weight:600">${(c.prepay>0&&rem<=0)?'✓ Tam':(c.prepay<=0?'—':'₺'+rem.toLocaleString('tr-TR'))}</td>
      <td>${repCellHTML(c)}</td>
      <td style="font-size:10px;color:var(--text3)">🕐 ${c.lastMod}</td>
    </tr>
    ${expandedRows.has(c.id)&&c.appPendingData&&c.appPendingData.length>0?
      '<tr style="background:var(--amber-bg);border-bottom:2px solid var(--amber)"><td colspan="'+(CU.role==='management'?'11':'10')+'" style="padding:6px 16px 10px '+(CU.role==='management'?'52px':'36px')+'">'+

        '<span style="color:var(--text2)">📅 '+(ap.date?fmtDate(ap.date):'Tarih girilmedi')+'</span>'+
        (ap.center?'<span style="color:var(--text3)">📍 '+ap.center+'</span>':'')+
        '<span style="color:var(--amber);font-size:10px;font-weight:600">⏳ Randevu Bekliyor</span>'+
        '</div>'
      ).join('')+
      '</div></td></tr>'

  }).join('');

function exportConsulateExcel(){
  const list=customers.filter(c=>CONSULATE_WAIT_S.includes(c.status)).sort((a,b)=>b.days-a.days);
  if(list.length===0){toast('Dışa aktarılacak müşteri yok','red');return;}
  const headers=['Dosya No','Ad Soyad','Telefon','E-posta','Ülke','Vize Türü','Aşama','Satış Temsilcisi','Evrak Sorumlusu','Randevu Sorumlusu','Bekleme Süresi (gün)','Kayıt Tarihi','Son Güncelleme'];
  const rows=list.map(c=>[
    c.id,c.name,c.phone,c.email||'',c.country,c.visa,c.status,
    c.rep||'—',c.evrakRep||'—',c.randevuRep||'—',
    c.days,c.created||'',c.lastMod||''
  ]);
  const data=[headers,...rows];
  const ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:16},{wch:22},{wch:14},{wch:25},{wch:14},{wch:18},{wch:20},{wch:18},{wch:18},{wch:18},{wch:16},{wch:18},{wch:18}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Konsolosluk Takibi');
  XLSX.writeFile(wb,`konsolosluk-takibi-${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('✓ Excel indirildi ('+list.length+' müşteri)','green');
}

let muhPeriod = 'month', muhDateFrom = '', muhDateTo = '';
const MUH_PERIODS = [['all','Tüm Zamanlar'],['today','Bugün'],['week','Bu Hafta'],['month','Bu Ay'],['quarter','Bu Çeyrek'],['year','Bu Yıl'],['custom','Özel Aralık'],['2026-01','Ocak 2026'],['2026-02','Şubat 2026'],['2026-03','Mart 2026'],['2026-04','Nisan 2026'],['2026-05','Mayıs 2026'],['2026-06','Haziran 2026'],['2026-07','Temmuz 2026'],['2026-08','Ağustos 2026'],['2026-09','Eylül 2026'],['2026-10','Ekim 2026'],['2026-11','Kasım 2026'],['2026-12','Aralık 2026']];

function inMuhPeriod(dateStr, period) {
  if (!dateStr) return false;
  if (period === 'all') return true;
  const d = new Date(dateStr), now = new Date();
  if (period === 'custom') {
    if (muhDateFrom) { const f = new Date(muhDateFrom); f.setHours(0,0,0,0); if (d < f) return false; }
    if (muhDateTo) { const t = new Date(muhDateTo); t.setHours(23,59,59,999); if (d > t) return false; }
    return true;
  }
  if (period === 'today') return d.toDateString() === now.toDateString();
  if (period === 'week') {
    const dow = now.getDay(), diff = dow===0?6:dow-1;
    const start = new Date(now); start.setDate(now.getDate()-diff); start.setHours(0,0,0,0);
    return d >= start;
  }
  if (period === 'month') return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
  if (period === 'quarter') return d.getFullYear()===now.getFullYear() && Math.floor(d.getMonth()/3)===Math.floor(now.getMonth()/3);
  if (period === 'year') return d.getFullYear()===now.getFullYear();
  if (/^\d{4}-\d{2}$/.test(period)) { const [y,m]=period.split('-').map(Number); return d.getFullYear()===y && d.getMonth()===m-1; }
  return true;
}

function getMuhMonthKey(dateStr) {
  if (!dateStr) return null;
  return dateStr.slice(0,7); // YYYY-MM
}

function fmtMonthKey(key) {
  const MONTHS_TR = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const [y, m] = key.split('-');
  return MONTHS_TR[parseInt(m)-1] + ' ' + y;
}


// ══ TEK GELİR KAYNAĞI ══
// allPayments doluysa customer_payments tablosundan (her ödeme kendi tarihiyle)
// allPayments boşsa customers.prepay'den fallback (eski sistem)
// Dönen format: [{fileNo, name, country, rep, amount, date, fee, prepay}]
function getIncomeItems(period, repFilter, countryFilter) {
  // Hibrit yaklaşım:
  // - customer_payments'ta kaydı olan müşteri → oradan oku (doğru tarihli)
  // - customer_payments'ta kaydı olmayan müşteri → customers.prepay'den oku (eski sistem)
  const trackedIds = new Set(allPayments.map(p => p.customer_file_number));
  const items = [];

  // YENİ SİSTEM: customer_payments'tan, dönem filtresiyle
  allPayments.filter(p => inMuhPeriod(p.payment_date, period)).forEach(p => {
    const c = customers.find(x => x.id === p.customer_file_number);
    if (repFilter && (c?.rep||'—') !== repFilter) return;
    if (countryFilter && (c?.country||'') !== countryFilter) return;
    items.push({
      paymentId: p.id || '',
      fileNo: p.customer_file_number,
      name: c?.name || '—',
      country: c?.country || '—',
      rep: c?.rep || '—',
      amount: Number(p.amount||0),
      date: p.payment_date || '',
      note: p.note || '',
      fee: c?.fee || 0,
      prepay: c?.prepay || 0,
      lastMod: c?.lastMod || '',
      lastModBy: c?.lastModBy || '',
    });
  });

  // ESKİ SİSTEM: customer_payments'ta kaydı olmayan müşteriler
  customers.filter(c =>
    !trackedIds.has(c.id) &&
    (c.prepay||0) > 0 &&
    inMuhPeriod(c.paymentDate || c.created, period) &&
    (!repFilter || c.rep === repFilter) &&
    (!countryFilter || c.country === countryFilter)
  ).forEach(c => {
    items.push({
      paymentId: '',
      fileNo: c.id,
      name: c.name,
      country: c.country || '—',
      rep: c.rep || '—',
      amount: c.prepay || 0,
      date: c.paymentDate || (c.created||'').slice(0,10) || '',
      note: '',
      fee: c.fee || 0,
      prepay: c.prepay || 0,
      lastMod: c.lastMod || '',
      lastModBy: c.lastModBy || '',
    });
  });

  return items;
}

function getMuhData(period) {
  // Hibrit: customer_payments'ta kayıtlı müşteriler oradan, diğerleri customers.prepay'den
  const items = getIncomeItems(period, '', '');
  const totalGelir = items.reduce((s,p)=>s+p.amount, 0);
  const uniqueCustCount = new Set(items.map(p=>p.fileNo)).size;

  const giderList = expenses.filter(e => inMuhPeriod(e.date, period));
  const totalGider = giderList.reduce((s,e)=>s+(e.amount||0), 0);
  // Müşteri bazlı giderler: müşterinin ödeme tarihi aya göre dönemle eşleştir
  const custExpList = allCustExpenses.filter(function(e){
    const c = customers.find(function(x){return x.id===e.customer_file_number;});
    return c && inMuhPeriod(c.paymentDate||c.created, period);
  });
  const totalCustExp = custExpList.reduce((s,e)=>s+Number(e.amount||0), 0);
  const totalIade = customers.filter(c=>c.refundStatus==='Gerçekleşti').reduce((s,c)=>s+(c.refundAmount||0),0);
  const bekleyenList = customers.filter(c=>(c.fee||0)>(c.prepay||0)&&c.status!=='İptal');
  const totalBekleyen = bekleyenList.reduce((s,c)=>s+((c.fee||0)-(c.prepay||0)),0);

  return { items, giderList, custExpList, totalGelir, totalGider, totalCustExp, totalIade, bekleyenList, totalBekleyen, uniqueCustCount };
}

function getMonthlyBreakdown() {
  const trackedIds = new Set(allPayments.map(p => p.customer_file_number));
  const monthMap = {};
  const custPerMonth = {}; // unique customer count per month

  // YENİ SİSTEM: customer_payments'tan
  allPayments.forEach(p => {
    const k = (p.payment_date||'').slice(0,7);
    if (!k) return;
    if (!monthMap[k]) monthMap[k] = {income:0,expense:0,count:0,refund:0};
    monthMap[k].income += Number(p.amount||0);
    if (!custPerMonth[k]) custPerMonth[k] = new Set();
    custPerMonth[k].add(p.customer_file_number);
  });

  // ESKİ SİSTEM: customer_payments'ta kaydı olmayan müşteriler
  customers.filter(c => !trackedIds.has(c.id) && (c.prepay||0)>0).forEach(c => {
    const k = getMuhMonthKey(c.paymentDate||c.created);
    if (!k) return;
    if (!monthMap[k]) monthMap[k] = {income:0,expense:0,count:0,refund:0};
    monthMap[k].income += c.prepay||0;
    if (!custPerMonth[k]) custPerMonth[k] = new Set();
    custPerMonth[k].add(c.id);
  });

  // Müşteri sayılarını uygula
  Object.keys(custPerMonth).forEach(k => {
    if (monthMap[k]) monthMap[k].count = custPerMonth[k].size;
  });

  // Gider
  expenses.forEach(e => {
    const k = getMuhMonthKey(e.date);
    if (!k) return;
    if (!monthMap[k]) monthMap[k] = {income:0,expense:0,count:0,refund:0};
    monthMap[k].expense += e.amount||0;
  });

  // Müşteri bazlı gider — müşterinin ödeme ayına yaz
  allCustExpenses.forEach(function(e) {
    const c = customers.find(function(x){ return x.id===e.customer_file_number; });
    const k = getMuhMonthKey(c ? (c.paymentDate||c.created) : '');
    if (!k) return;
    if (!monthMap[k]) monthMap[k] = {income:0,expense:0,count:0,refund:0};
    monthMap[k].expense += Number(e.amount||0);
  });

  // İade
  customers.filter(c=>c.refundStatus==='Gerçekleşti').forEach(c => {
    const k = getMuhMonthKey(c.refundDate||c.paymentDate||c.created);
    if (!k) return;
    if (!monthMap[k]) monthMap[k] = {income:0,expense:0,count:0,refund:0};
    monthMap[k].refund += c.refundAmount||0;
  });

  return Object.entries(monthMap).sort((a,b)=>b[0].localeCompare(a[0]));
}

function getRepBreakdown(items) {
  const repMap = {};
  items.forEach(p=>{
    const k = p.rep||'—';
    if (!repMap[k]) repMap[k] = {txnCount:0,income:0};
    repMap[k].txnCount++;
    repMap[k].income += Number(p.amount)||0;
  });
  return Object.entries(repMap).sort((a,b)=>b[1].income-a[1].income);
}

function getCountryBreakdown(items) {
  const cMap = {};
  items.forEach(p=>{
    const k = p.country||'Bilinmiyor';
    if (!cMap[k]) cMap[k] = {txnCount:0,income:0};
    cMap[k].txnCount++;
    cMap[k].income += Number(p.amount)||0;
  });
  return Object.entries(cMap).sort((a,b)=>b[1].income-a[1].income);
}

function exportMuhTamRapor() {
  const { items: tamItems, giderList, custExpList, totalGelir, totalGider, totalCustExp, totalBekleyen, totalIade, uniqueCustCount } = getMuhData(muhPeriod);
  const netKar = totalGelir - totalGider - totalCustExp;
  const monthly = getMonthlyBreakdown();
  const repData = getRepBreakdown(tamItems);
  const countryData = getCountryBreakdown(tamItems);
  const wb = XLSX.utils.book_new();
  const period = MUH_PERIODS.find(([v])=>v===muhPeriod)?.[1]||muhPeriod;

  // Sheet 1: Ozet
  const ozet = [
    ['VizeCRM Muhasebe Raporu - '+period],[''],
    ['Toplam Tahsilat (₺)', totalGelir],
    ['Genel Giderler (₺)', totalGider],
    ['Müşteri Giderleri (₺)', totalCustExp],
    ['Net Kar/Zarar (₺)', netKar],
    ['Bekleyen Tahsilat (₺)', totalBekleyen],
    ['Toplam Iade (₺)', totalIade],
    ['Odeme Alan Musteri', uniqueCustCount],
    ['Ort. Musteri Degeri (₺)', uniqueCustCount?Math.round(totalGelir/uniqueCustCount):0],
    ['Rapor Tarihi', new Date().toLocaleDateString('tr-TR')],
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ozet), 'Ozet');

  // Sheet 2: Aylik
  const aylikH = ['Ay','Tahsilat','Gider','Net','Iade','Musteri'];
  const aylikR = monthly.map(([k,v])=>[fmtMonthKey(k),v.income,v.expense,v.income-v.expense,v.refund,v.count]);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([aylikH,...aylikR]), 'Aylik');

  // Sheet 3: Temsilci
  const repH = ['Temsilci','Islem Sayisi','Toplam Ciro','Islem Basi Ortalama'];
  const repR = repData.map(([r,v])=>[r,v.txnCount,v.income,Math.round(v.income/v.txnCount)]);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([repH,...repR]), 'Temsilci');

  // Sheet 4: Ulke
  const cntH = ['Ulke','Islem Sayisi','Ciro','Ortalama'];
  const cntR = countryData.map(([c,v])=>[c,v.txnCount,v.income,Math.round(v.income/v.txnCount)]);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([cntH,...cntR]), 'Ulke');

  // Sheet 5: Odemeler (tamItems'dan alınıyor, yukarıda tanımlı)
  const tahH = ['Tarih','Dosya No','Musteri','Ulke','Temsilci','Tutar','Not'];
  const tahR = tamItems.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(p=>[p.date,p.fileNo,p.name,p.country,p.rep,p.amount,p.note||'']);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([tahH,...tahR]), 'Odemeler');

  // Sheet 7: Genel Gider
  const gdrH = ['Tarih','Kategori','Aciklama','Tutar','Kaydeden'];
  const gdrR = giderList.map(e=>[e.date,e.category,e.description||'',e.amount,e.created_by||'']);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([gdrH,...gdrR]), 'Genel-Gider');

  // Sheet 8: Müşteri Giderleri
  const cgH = ['Dosya No','Müşteri','Tutar','Açıklama','Kaydeden','Tarih'];
  const cgR = custExpList.map(function(e){
    const c=customers.find(function(x){return x.id===e.customer_file_number;});
    return [e.customer_file_number,c?c.name:'—',Number(e.amount),e.description||'',e.created_by||'',e.created_at?e.created_at.slice(0,10):''];
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([cgH,...cgR]), 'Musteri-Giderleri');

  XLSX.writeFile(wb,`VizeCRM-Muhasebe-${period.replace(/ /g,'_')}-${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('✓ Tam rapor indirildi (8 sekme)','green');
}

    return '<th style="padding:10px 14px;' + (r?'text-align:right;':'') + 'font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)">' + t + '</th>';

          + (type==='rep' ? '<td style="padding:10px 14px;color:var(--text2)">' + p.country + '</td>' : '<td style="padding:10px 14px;color:var(--text2)">' + p.rep + '</td>')
          + '<td style="padding:10px 14px;text-align:right;color:var(--text2)">' + fmtTL(p.fee||0) + '</td>'
          + '<td style="padding:10px 14px;text-align:right;color:var(--green);font-weight:700">' + fmtTL(p.amount) + '</td>'
          + '<td style="padding:10px 14px;text-align:right;color:' + (rem>0?'var(--amber)':'var(--green)') + ';font-weight:600">' + (rem>0?fmtTL(rem):'✓ Tam') + '</td>'
          + '<td style="padding:10px 14px;color:var(--text3);font-size:11px">' + (p.date?fmtDate(p.date):'—') + '</td>'
          + '<td style="padding:10px 14px;font-size:11px">' + (p.lastModBy?'<b style=color:var(--text)>'+p.lastModBy+'</b><br>':'') + '<span style=color:var(--text3)>' + (p.lastMod||'—') + '</span></td>'

  m.innerHTML = '<div style="background:var(--bg);border-radius:16px;width:100%;max-width:860px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.3)">'
    + '<div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">'
    + '<div><div style="font-size:16px;font-weight:700">' + title + '</div>'
    + '<div style="font-size:13px;color:var(--green);font-weight:600;margin-top:2px">' + filtered.length + ' müşteri · Toplam: ' + fmtTL(total) + '</div></div>'
    + '<button id="muh-det-close" style="background:none;border:none;font-size:20px;cursor:pointer">✕</button></div>'
    + '<div style="overflow-y:auto;flex:1"><table style="width:100%;border-collapse:collapse;font-size:12px">'
    + '<thead style="position:sticky;top:0;background:var(--surface2)"><tr>'
    + th('Müşteri') + th(type==='rep'?'Ülke':'Temsilci') + th('Toplam Ücret',true) + th('Ödenen',true) + th('Kalan',true) + th('Ödeme Tarihi') + th('Son Güncelleme')
    + '</tr></thead><tbody>' + rows + '</tbody></table></div>'
    + '<div style="padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:12px;color:var(--text2)">'
    + '<span>' + filtered.length + ' müşteri</span>'
    + '<span style="font-weight:700;color:var(--green)">Toplam Tahsilat: ' + fmtTL(total) + '</span></div>'
    + '</div>';

  document.body.appendChild(m);
  document.getElementById('muh-det-close').addEventListener('click', function(){ m.remove(); });
  m.querySelectorAll('.muh-det-row').forEach(function(tr) {
    tr.addEventListener('mouseover', function(){ tr.style.background=hov; });

    tr.addEventListener('click', function(){ m.remove(); openPanel(tr.dataset.fno); });

async function addCustExpense(custId) {
  var amt = parseFloat(document.getElementById('cexp-amt-'+custId)?.value);
  var desc = (document.getElementById('cexp-desc-'+custId)?.value||'').trim();
  if(!amt||amt<=0){toast('Tutar giriniz','red');return;}
  try{
    var res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'addCustomerExpense',customerId:custId,custExpAmount:amt,custExpDesc:desc,token:CU.token})});
    var d=await res.json();
    if(!d.success){toast('Hata: '+(d.error?.message||'Eklenemedi'),'red');return;}
    toast('-'+fmtTL(amt)+' gider eklendi','green');
    await openPanel(custId,panelReadOnly);
  }catch(e){toast('Bağlantı hatası','red');}
}

async function deleteCustExpense(custId, expId) {
  if(!confirm('Bu gider kaydı silinecek?'))return;
  try{
    var res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'deleteCustomerExpense',custExpId:expId,token:CU.token})});
    var d=await res.json();
    if(!d.success){toast('Silinemedi','red');return;}
    toast('Gider silindi','red');
    await openPanel(custId,panelReadOnly);
  }catch(e){toast('Bağlantı hatası','red');}
}

async function saveEditPayment(payId, btn) {
  const payAmt = parseFloat(document.getElementById('edit-pay-amt').value);
  const payNote = document.getElementById('edit-pay-note').value.trim();
  if (!payAmt || payAmt <= 0) { toast('Tutar zorunludur','red'); return; }
  btn.disabled = true; btn.textContent = '...';
  try {
    const res = await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'updatePaymentRecord',payId,payAmt,payNote,token:CU.token})});
    const d = await res.json();
    if (!d.success) { toast('Hata: '+(d.error?.message||'Güncellenemedi'),'red'); btn.disabled=false; btn.textContent='✓ Güncelle'; return; }
    btn.closest('div[style*="fixed"]').remove();
    toast('✓ Ödeme güncellendi','green');
    await loadCustomers();

async function loadFiles(customerId){
  const listEl=document.getElementById('file-list-'+customerId);
  const countEl=document.getElementById('file-count-'+customerId);
  if(!listEl)return;
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'getFiles',customerId,token:CU.token})});
    const d=await res.json();
    const files=d.files||[];
    if(countEl)countEl.textContent=files.length+' dosya';
    if(files.length===0){
      listEl.innerHTML='<div style="font-size:12px;color:var(--text3)">Henüz dosya yüklenmedi.</div>';
      return;
    }
    function fmtSize(b){if(b<1024)return b+'B';if(b<1048576)return (b/1024).toFixed(1)+'KB';return (b/1048576).toFixed(1)+'MB';}
    function fmtFileName(n){const parts=n.split('_');return parts.length>1?parts.slice(1).join('_'):n;}
    const canDelete=CU.role==='management'||CU.role==='evrak'||(CU.role==='sales');
    listEl.innerHTML=files.map(f=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--surface2);border-radius:7px;border:1px solid var(--border);gap:8px">
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">📎 ${fmtFileName(f.name)}</div>
          <div style="font-size:10px;color:var(--text3)">${fmtSize(f.size)}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <a href="${f.url}" target="_blank" class="btn btn-ghost btn-sm" style="text-decoration:none">⬇ İndir</a>
          ${canDelete?`<button class="btn btn-danger btn-sm" onclick="deleteFile('${customerId}','${f.name}')">✕</button>`:''}
        </div>
      </div>`).join('');
  }catch(e){
    if(listEl)listEl.innerHTML='<div style="font-size:12px;color:var(--text3)">Dosyalar yüklenemedi.</div>';
  }
}

async function uploadFile(customerId, input){
  const file=input.files[0];
  if(!file)return;
  if(file.size>15*1024*1024){toast('Dosya 15MB\'dan büyük olamaz','red');input.value='';return;}
  const btn=input.parentElement?.querySelector('button');
  if(btn){btn.disabled=true;btn.textContent='Yükleniyor...';}
  try{
    const reader=new FileReader();
    reader.onload=async(e)=>{
      const base64=e.target.result;
      const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'uploadFile',customerId,fileName:file.name,fileData:base64,fileType:file.type,token:CU.token})});
      const d=await res.json();
      if(!d.success){toast('Yükleme hatası','red');}
      else{toast('✓ Dosya yüklendi','green');loadFiles(customerId);}
      if(btn){btn.disabled=false;btn.textContent='📎 Dosya Seç ve Yükle';}
      input.value='';
    };
    reader.readAsDataURL(file);
  }catch(e){
    toast('Bağlantı hatası','red');
    if(btn){btn.disabled=false;btn.textContent='📎 Dosya Seç ve Yükle';}
  }
}

async function deleteFile(customerId, fileName){
  if(!confirm('Bu dosyayı silmek istediğine emin misin?'))return;
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'deleteFile',customerId,fileName,token:CU.token})});
    const d=await res.json();
    if(!d.success){toast('Silinemedi','red');return;}
    toast('🗑 Dosya silindi','amber');
    loadFiles(customerId);
  }catch(e){toast('Bağlantı hatası','red');}
}

  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'transferCustomer',customerId:id,newRepUsername:newRep,token:CU.token})});
    const d=await res.json();
    if(!d.success){toast('Hata: '+JSON.stringify(d.error||'Aktarılamadı'),'red');return;}
    await loadCustomers();
    await openPanel(id);
    if(document.getElementById('cust-tbody'))renderRows();
    if(document.getElementById('kanban'))renderPipeline();
    toast('✓ Temsilciye aktarıldı','green');
  }catch(e){

  }
}

async function requestRefund(id){
  const amt=parseInt(document.getElementById('rf-amt-'+id)?.value)||0;
  const reason=(document.getElementById('rf-reason-'+id)?.value||'').trim();
  if(!amt||!reason){toast('Tutar ve neden zorunludur','red');return;}
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'requestRefund',customerId:id,refundAmount:amt,refundReason:reason,token:CU.token})});
    const d=await res.json();
    if(!d.success){toast('Hata: '+JSON.stringify(d.error||'Kaydedilemedi'),'red');return;}
    await loadCustomers();

async function exportExcel(){
  if(CU.role!=='management'){toast('Bu işlem için yetkiniz yok','red');return;}
  const list=getTableData();
  if(!list||list.length===0){toast('Dışa aktarılacak müşteri yok','red');return;}
  toast('⏳ Excel hazırlanıyor...','blue');
  try{
    // Her müşteri için detay çek
    const details={};
    await Promise.all(list.map(async c=>{
      try{
        const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'getCustomerDetail',customerId:c.id,token:CU.token})});
        const d=await res.json();
        details[c.id]=d;
      }catch(e){details[c.id]={};}
    }));

    const headers=[
      'Dosya No','Ad Soyad','Telefon','E-posta',
      'Ülke','Vize Türü','Aşama',
      'Satış Temsilcisi','Evrak Sorumlusu','Randevu Sorumlusu',
      'Toplam Ücret (₺)','Ön Ödeme (₺)','Kalan Ödeme (₺)','Ödeme Durumu',
      'Randevu Tarihi','Randevu Saati','Randevu Merkezi',
      'İade Durumu','İade Tutarı (₺)','İade Nedeni',
      'Refakatçi Sayısı','Refakatçiler',
      'Not Sayısı','Son Not',
      'Arama Sayısı','Ulaşılan Arama',
      'Belge Sayısı','Tamamlanan Belge',
      'Kayıt Tarihi','Son Güncelleme','Kaynak'
    ];

    const rows=list.map(c=>{
      const d=details[c.id]||{};
      const notes=d.notes||[];
      const calls=d.calls||[];
      const docs=d.documents||[];
      const companions=d.companions||[];
      const rem=(c.fee||0)-(c.prepay||0);
      const paidFull=c.fee>0&&rem<=0;
      const completedDocs=docs.filter(x=>x.status==='Onaylandı').length;
      const reachedCalls=calls.filter(x=>x.result==='ulasildi').length;
      const companionList=companions.map(cp=>cp.name+(cp.relationship?'('+cp.relationship+')':'')).join(', ');
      const lastNote=notes.length>0?notes[0].text?.replace(/\n/g,' '):'';
      return [
        c.id,
        c.name,
        c.phone,
        c.email||'',
        c.country,
        c.visa,
        c.status,
        c.rep||'—',
        c.evrakRep||'—',
        c.randevuRep||'—',
        c.fee||0,
        c.prepay||0,
        rem>0?rem:0,
        paidFull?'Tahsil Edildi':'Bekliyor',
        c.apptDate||'',
        c.apptTime||'',
        c.apptCenter||'',
        c.refundStatus||'Yok',
        c.refundAmount||0,
        c.refundReason||'',
        companions.length,
        companionList,
        notes.length,
        lastNote,
        calls.length,
        reachedCalls,
        docs.length,
        completedDocs,
        c.created||'',
        c.lastMod||'',
        c.source==='google_forms'?'Google Form':'Manuel'
      ];
    });

    const data=[headers,...rows];
    const ws=XLSX.utils.aoa_to_sheet(data);

    // Kolon genişlikleri
    ws['!cols']=[
      {wch:16},{wch:22},{wch:14},{wch:25},
      {wch:14},{wch:18},{wch:22},
      {wch:18},{wch:18},{wch:18},
      {wch:14},{wch:14},{wch:14},{wch:14},
      {wch:14},{wch:12},{wch:14},
      {wch:14},{wch:14},{wch:20},
      {wch:12},{wch:30},
      {wch:10},{wch:40},
      {wch:12},{wch:14},
      {wch:12},{wch:16},
      {wch:18},{wch:18},{wch:12}
    ];

    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Müşteriler');
    XLSX.writeFile(wb,`vizecrm-detayli-${new Date().toISOString().slice(0,10)}.xlsx`);
    toast('✓ Detaylı Excel indirildi ('+list.length+' müşteri)','green');
  }catch(e){
    toast('Excel oluşturulurken hata oluştu','red');
  }
}

// Başvuru Yapıldı durumuna geçmeden önce bekleyen randevu kontrolü
function checkPendingApplications(custId, newStatus, applications) {
  if (newStatus !== 'Başvuru Yapıldı') return true;
  const pending = applications.filter(ap => ap.status !== 'Tamamlandı' && ap.appt_date);
  if (pending.length === 0) return true;
  const names = pending.map(ap => {
    const nm = ap.applicant_name || 'Ana başvuru';
    const dt = ap.appt_date ? fmtDate(ap.appt_date) : '';
    return nm + (dt ? ' — ' + dt : '');
  }).join('\n');
  return confirm(
    '⚠️ DİKKAT!\n\nHenüz başvurusu yapılmamış randevu(lar) var:\n\n' + names +
    '\n\nYine de "Başvuru Yapıldı" olarak işaretlemek istiyor musunuz?'
  );
}

    if(document.getElementById('kanban'))renderPipeline();
    toast('✓ Kalan ödeme tahsil edildi','green');
  }catch(e){
    toast('Bağlantı hatası','red');
  }
}
async function addCall(id){
  const r=document.getElementById('cl-r-'+id)?.value,nt=(document.getElementById('cl-n-'+id)?.value||'').trim();
  if(!r)return;
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'addCall',customerId:id,callResult:r,callNote:nt,token:CU.token})});
    const d=await res.json();
    if(!d.success){toast('Hata: '+JSON.stringify(d.error||'Kaydedilemedi'),'red');return;}
    await loadCustomers();
    await openPanel(id);
    if(document.getElementById('cust-tbody'))renderRows();
    toast('📞 Arama kaydedildi — '+RLABELS[r],'blue');
  }catch(e){
    toast('Bağlantı hatası','red');
  }
}
async function saveNote(id){
  const inp=document.getElementById('ni-'+id);const text=(inp?.value||'').trim();
  if(!text){toast('Not boş olamaz','amber');return;}
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'addNote',customerId:id,text,token:CU.token})});
    const d=await res.json();
    if(!d.success){toast('Hata: '+JSON.stringify(d.error||'Kaydedilemedi'),'red');return;}
    inp.value='';
    await loadCustomers();
    await openPanel(id);
    if(document.getElementById('cust-tbody'))renderRows();
    toast('✓ Not kaydedildi','green');
  }catch(e){
    toast('Bağlantı hatası','red');
  }
}
function closePanel(){document.getElementById('overlay').classList.remove('open');document.getElementById('detail-panel').classList.remove('open');}
async function openModal(){
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'getUsers',token:CU.token})});
    const d=await res.json();
    const salesReps=(d.users||[]).filter(u=>u.role==='sales');
    const repSelect=document.getElementById('nm-rep');
    if(CU.role==='sales'||CU.role==='evrak'||CU.role==='randevu'){
      repSelect.innerHTML=`<option value="${CU.username}">${CU.name} (Ben)</option>`;
      repSelect.disabled=true;
    } else {
      repSelect.disabled=false;
      repSelect.innerHTML=salesReps.map(u=>`<option value="${u.username}">${u.name}</option>`).join('');
    }
  }catch(e){}
  document.getElementById('add-modal').classList.add('open');
}
function closeModal(){
  document.getElementById('add-modal').classList.remove('open');
  const btn=document.querySelector('#add-modal .btn-primary');
  if(btn){btn.disabled=false;btn.textContent='✓ Müşteriyi Kaydet';}
  addingCustomer=false;
}

async function addCustomer(){
  if(addingCustomer)return;
  addingCustomer=true;
  const name=document.getElementById('nm-name').value.trim(),phone=document.getElementById('nm-phone').value.trim();
  const email=document.getElementById('nm-email').value.trim();
  if(!name||!phone||!email){toast('Ad, telefon ve e-posta zorunludur','red');addingCustomer=false;return;}
  const fee=parseInt(document.getElementById('nm-fee').value)||0,pre=parseInt(document.getElementById('nm-pre').value)||0;
  const country=document.getElementById('nm-country').value;
  const visa_type=document.getElementById('nm-visa').value;
  const assignTo=document.getElementById('nm-rep').value;
  if(!assignTo){toast('Lütfen bir satış temsilcisi seçin','red');addingCustomer=false;return;}
  const btn=document.querySelector('#add-modal .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Kaydediliyor...';}
  const regDate=document.getElementById('nm-reg-date')?.value||'';
  const payload=JSON.stringify({action:'addCustomer',name,phone,email,country,visa_type,fee,prepay:pre,assignTo,registrationDate:regDate||null,token:CU.token});
  let res=null;
  try{
    res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:payload});
  }catch(e){
    // İlk denemede bağlantı hatası — 1.5 saniye bekleyip tekrar dene (cold start)
    if(btn)btn.textContent='Tekrar deneniyor...';
    await new Promise(r=>setTimeout(r,1500));
    try{
      res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:payload});
    }catch(e2){
      toast('Bağlantı hatası — internet bağlantınızı kontrol edin','red');
      if(btn){btn.disabled=false;btn.textContent='✓ Müşteriyi Kaydet';}
      addingCustomer=false;return;
    }
  }
  try{
    const d=await res.json();
    if(!d.success){toast('Hata: '+JSON.stringify(d.error||'Eklenemedi'),'red');if(btn){btn.disabled=false;btn.textContent='✓ Müşteriyi Kaydet';}addingCustomer=false;return;}
    if(d.duplicate){toast('⚠️ Bu telefon numarası az önce kaydedildi ('+d.id+')','amber');closeModal();addingCustomer=false;loadCustomers().then(()=>{if(document.getElementById('cust-tbody'))renderRows();});return;}
    closeModal();
    toast('✓ '+name+' eklendi — '+d.id+' ('+d.assignedTo+'\'a atandı)','green');
    ['nm-name','nm-phone','nm-email','nm-fee','nm-pre','nm-rem'].forEach(i=>{const el=document.getElementById(i);if(el)el.value='';});
    loadCustomers().then(()=>{if(document.getElementById('cust-tbody'))renderRows();if(document.getElementById('kanban'))renderPipeline();});
  }catch(e){
    toast('Sunucu yanıt hatası — lütfen tekrar deneyin','red');
    if(btn){btn.disabled=false;btn.textContent='✓ Müşteriyi Kaydet';}
  }finally{
    addingCustomer=false;
  }
}
</script>
<style>
.p-label{font-size:12px;color:var(--text)}
</style>
</body>
