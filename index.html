<script>

// SUPABASE BAĞLANTISI
// Supabase kurulumundan sonra bu bilgileri doldurun:

const SUPABASE_URL = 'https://huhijoftpgizixwtjwpk.supabase.co';    // ← Supabase URL buraya
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1aGlqb2Z0cGdpeml4d3Rqd3BrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkzODg5NDgsImV4cCI6MjA2NDk2NDk0OH0.fWH8stLIPQ3RGjPomWUNtM3Dq_q5HsVz1ZHrFDjIgts';   // ← Supabase anon key buraya

const EDGE_FUNCTION_URL = 'https://huhijoftpgizixwtjwpk.supabase.co/functions/v1/bright-handler';

let supabaseClient = null;
let USE_SUPABASE = true; // Supabase bilgilerini girdikten sonra true yapın

// Edge Function üzerinden bağlantı
if (EDGE_FUNCTION_URL && !EDGE_FUNCTION_URL.includes('XXXXX')) {
  USE_SUPABASE = true;
  console.log('✅ Supabase bağlantısı aktif');
} else {
  console.log('⚠️ Edge Function URL girilmedi');
}

// ============================================
// SUPABASE VERİ FONKSİYONLARI
// ============================================

// Tüm müşterileri çek
async function fetchCustomers() {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('customers')
    .select('*, sales_rep:users!sales_rep_id(name), ops_user:users!ops_id(name)')
    .order('created_at', { ascending: false });
  if (error) { console.error('fetchCustomers:', error); return null; }
  return data;
}

// Müşteri güncelle (status, ödeme vs.)
async function updateCustomer(id, updates) {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('customers')
    .update(updates)
    .eq('id', id)
    .select();
  if (error) { console.error('updateCustomer:', error); return null; }
  return data;
}

// Yeni müşteri ekle
async function insertCustomer(customer) {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('customers')
    .insert([customer])
    .select();
  if (error) { console.error('insertCustomer:', error); return null; }
  return data;
}

// Not ekle
async function insertNote(customerId, content, authorName) {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('notes')
    .insert([{ customer_id: customerId, content, author_name: authorName }]);
  if (error) { console.error('insertNote:', error); return null; }
  return data;
}

// Arama kaydı ekle
async function insertCallLog(customerId, result, note, callerName) {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('call_logs')
    .insert([{ customer_id: customerId, result, note, caller_name: callerName }]);
  if (error) { console.error('insertCallLog:', error); return null; }
  return data;
}

// Status geçmişi ekle
async function insertStatusHistory(customerId, fromStatus, toStatus, changedByName) {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('status_history')
    .insert([{ customer_id: customerId, from_status: fromStatus, to_status: toStatus }]);
  if (error) { console.error('insertStatusHistory:', error); return null; }
  return data;
}

// Kullanıcı girişi - Edge Function üzerinden
async function signInUser(username, password) {
  try {
    const res = await fetch(EDGE_FUNCTION_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', username, password })
    });
    const data = await res.json();
    if (!res.ok || data.error) return null;
    return data;  // { user, token }
  } catch(e) {
    console.error('Edge Function login hatası:', e);
    return null;
  }
}

// Şifre güncelle
async function updatePassword(userId, newPassword) {
  if (!USE_SUPABASE) return false;
  const { error } = await supabaseClient
    .from('users')
    .update({ password_hash: newPassword })
    .eq('id', userId);
  return !error;
}

// Kullanıcı adı güncelle
async function updateUsername(userId, newUsername) {
  if (!USE_SUPABASE) return false;
  const { error } = await supabaseClient
    .from('users')
    .update({ username: newUsername })
    .eq('id', userId);
  return !error;
}

// Ad güncelle
async function updateDisplayName(userId, newName) {
  if (!USE_SUPABASE) return false;
  const { error } = await supabaseClient
    .from('users')
    .update({ name: newName, rep_name: newName })
    .eq('id', userId);
  return !error;
}

// Gerçek zamanlı müşteri güncellemeleri dinle
function subscribeToCustomers(callback) {
  if (!USE_SUPABASE) return;
  supabaseClient
    .channel('customers')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'customers' }, callback)
    .subscribe();
}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

  --surface:#FFFFFF;
  --surface2:#F9FAFB;
  --border:#E5E7EB;
  --border2:#D1D5DB;
  --text:#111827;
  --text2:#6B7280;
  --text3:#9CA3AF;
  --accent:#2563EB;
  --accent-l:#EFF6FF;
  --accent-t:#1D4ED8;
  --green:#059669;
  --green-bg:#ECFDF5;
  --amber:#D97706;
  --amber-bg:#FFFBEB;
  --red:#DC2626;
  --red-bg:#FEF2F2;

  --purple-bg:#F5F3FF;

}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}

/* ===== LOGIN ===== */

.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:420px;max-width:100%;box-shadow:0 1px 3px rgba(0,0,0,.05),0 8px 24px rgba(0,0,0,.06)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.login-logo-icon{width:36px;height:36px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.login-logo-text{font-size:20px;font-weight:800;letter-spacing:-.5px;color:var(--text)}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.login-lbl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em}
.login-inp{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:8px;font-size:13px;color:var(--text);background:#fff;outline:none;transition:all .15s;margin-bottom:12px;font-family:inherit}
.login-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.login-btn{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;margin-top:4px}
.login-btn:hover{background:var(--accent-t)}
.login-err{background:var(--red-bg);border:1px solid #FECACA;color:var(--red);border-radius:8px;padding:10px 12px;font-size:12px;margin-bottom:12px;display:none}
.divider{height:1px;background:var(--border);margin:20px 0}


/* ===== LAYOUT ===== */
#app{display:none}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}

/* ===== SIDEBAR ===== */

.sb-logo-icon{width:30px;height:30px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;flex-shrink:0}

.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .12s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--accent-l);color:var(--accent);font-weight:600}
.nav-icon{width:16px;text-align:center;flex-shrink:0}

/* ===== TOPBAR ===== */
.topbar-title{font-size:15px;font-weight:700;letter-spacing:-.2px}

.tb-search input::placeholder{color:var(--text3)}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .12s;font-family:inherit;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-t)}

/* ===== AVATAR ===== */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}

.av-40{width:40px;height:40px;font-size:14px}

.stat-card.c-blue::after{background:var(--accent)}

.stat-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:14px}
.stat-val{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px;font-weight:500}
.stat-trend{font-size:11px;margin-top:8px}

/* ===== TABLE ===== */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tbl-toolbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
.tbl-label{font-size:13px;font-weight:600}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:9px 12px;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}

.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#FAFBFF;cursor:pointer}
.tbl td b{color:var(--text);font-weight:600}

/* ===== FILTER BAR ===== */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:180px}

.si{width:100%;padding:7px 12px 7px 30px;background:var(--surface);border:1px solid var(--border2);border-radius:7px;font-size:12px;color:var(--text);outline:none;font-family:inherit}

.si::placeholder{color:var(--text3)}
.sel{padding:7px 10px;background:var(--surface);border:1px solid var(--border2);border-radius:7px;font-size:12px;color:var(--text2);outline:none;cursor:pointer;font-family:inherit}

.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;letter-spacing:.02em}

.b-callback{background:#EFF6FF;color:#2563EB}

.b-ops{background:var(--green-bg);color:var(--green)}

/* ===== KANBAN ===== */

.k-col{min-width:180px;max-width:180px}
.k-head{padding:7px 11px;border-radius:7px 7px 0 0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;justify-content:space-between}
.k-cnt{background:rgba(0,0,0,.1);border-radius:20px;padding:1px 6px;font-size:10px}

.panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:150;backdrop-filter:blur(1px)}

.panel-body{padding:18px;display:flex;flex-direction:column;gap:14px}

/* ===== PANEL SECTIONS ===== */
.ps{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.ps-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2)}

/* ===== PROGRESS ===== */

.pay-row:last-child{border-bottom:none}
.pay-lbl{font-size:12px;color:var(--text2)}
.pay-val{font-size:14px;font-weight:700}
.pbadge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.pb-ok{background:var(--green-bg);color:var(--green)}
.pb-pend{background:var(--amber-bg);color:var(--amber)}

/* ===== NOTES & CALLS ===== */
.note-item{background:#FFFBEB;border-left:3px solid var(--amber);padding:10px 12px;border-radius:0 7px 7px 0;margin-bottom:8px}
.note-item:last-child{margin-bottom:0}

.note-meta{font-size:10px;color:var(--text3);margin-top:4px}

.call-item:last-child{border-bottom:none}

/* ===== TIMELINE ===== */
.tl-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:4px;flex-shrink:0}
.tl-label{font-size:12px;color:var(--text);font-weight:500}
.tl-meta{font-size:10px;color:var(--text3);margin-top:2px}

/* ===== MODAL ===== */
.modal{display:none;position:fixed;inset:0;z-index:300;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(2px)}
.modal-box{position:relative;background:#fff;border:1px solid var(--border);border-radius:14px;padding:28px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:20px;letter-spacing:-.2px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{margin-bottom:14px}
.fl2{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em}
.fi2{width:100%;padding:8px 11px;background:#fff;border:1px solid var(--border2);border-radius:7px;font-size:13px;color:var(--text);outline:none;transition:all .12s;font-family:inherit}
.fi2:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.fi2::placeholder{color:var(--text3)}
textarea.fi2{resize:vertical}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ===== QUICK STATUS ===== */
.qs-btn{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:#fff;color:var(--text2);transition:all .12s;font-family:inherit}
.qs-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l)}
.qs-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-l)}

/* ===== CHARTS ===== */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.chart-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px}
.chart-title{font-size:13px;font-weight:600;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-lbl{font-size:11px;color:var(--text2);min-width:82px;text-align:right}
.bar-track{flex:1;background:var(--bg);border-radius:4px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-val{font-size:11px;color:var(--text3);min-width:48px}

/* ===== USER CARDS ===== */
.user-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.user-card:hover{border-color:var(--border2)}

/* ===== ACCOUNT ===== */
.acc-sec{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px}
.acc-title{font-size:14px;font-weight:700;margin-bottom:3px}
.acc-sub{font-size:12px;color:var(--text2);margin-bottom:14px}

/* ===== ALERT ===== */
.alert{border-radius:10px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px}
.alert-red{background:#FEF2F2;border:1px solid #FECACA}

/* ===== TOAST ===== */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:1000;display:flex;flex-direction:column;gap:8px}

@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}.charts-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<script>
if (localStorage.getItem('vizecrm_token')) {
  document.write('<style>#login-screen{display:none !important}</style>');

</script>

  <div class="modal-box">

    <div class="form-row">
      <div class="fg"><label class="fl2">Ad Soyad *</label><input class="fi2" placeholder="Fatma Yılmaz" id="nm-name"></div>

      <div class="fg"><label class="fl2">Hedef Ülke *</label>
        <select class="fi2" id="nm-country"><option>🇩🇪 Almanya</option><option>🇬🇧 İngiltere</option><option>🇳🇱 Hollanda</option><option>🇫🇷 Fransa</option><option>🇺🇸 Amerika</option><option>🇧🇪 Belçika</option></select></div>
      <div class="fg"><label class="fl2">Vize Türü</label>
        <select class="fi2" id="nm-visa"><option>Schengen Turistik</option><option>Çalışma Vizesi</option><option>Öğrenci Vizesi</option><option>Aile Birleşimi</option></select></div>
    </div>

      <div class="fg"><label class="fl2">Toplam Bedel (₺)</label><input class="fi2" type="number" placeholder="65000" id="nm-fee" oninput="calcR()"></div>
    </div>

    <div class="modal-foot">

<div class="toast-wrap" id="toast-wrap"></div>

<script>
// Local USERS sadece Supabase bağlantısı olmadığında kullanılır
const USERS=[];
let CU=null;

const STAGES=['Yeni Kayıt','Sonra Ara','Ulaşılamıyor','İlgilenmiyor','İletişime Geçildi','Teklif Gönderildi','Satış Kapatıldı','Ödeme Alındı','Belge Bekleniyor','Belgeler Tamam','Randevu Aranıyor','Randevu Alındı','Başvuru Yapıldı','Sonuç Bekleniyor','Tamamlandı','İptal'];
const SCLS={'Yeni Kayıt':'b-lead','Sonra Ara':'b-callback','Ulaşılamıyor':'b-unreachable','İlgilenmiyor':'b-notinterested','İletişime Geçildi':'b-contacted','Teklif Gönderildi':'b-proposal','Satış Kapatıldı':'b-sale','Ödeme Alındı':'b-payment','Belge Bekleniyor':'b-docs-pending','Belgeler Tamam':'b-docs-done','Randevu Aranıyor':'b-appt-search','Randevu Alındı':'b-appt-sched','Başvuru Yapıldı':'b-submitted','Sonuç Bekleniyor':'b-waiting','Tamamlandı':'b-completed','İptal':'b-cancelled'};
const MONTHS=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
const RCOLS={'Ece Aydın':'#2563EB','Mehmet Kaya':'#D97706','Ayşe Türk':'#059669','Burak Sarı':'#DC2626','Ceren Yılmaz':'#0891B2','Onur Demir':'#7C3AED','Zehra Kaya':'#0D9488'};
// Notlar ve aramalar artık customer_notes / customer_calls tablolarından geliyor

let customers=[];
let filtered=[];

function fmtDT(iso){
  if(!iso)return'—';
  const d=new Date(iso);
  return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

async function loadCustomers(){
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'getCustomers',token:CU.token})});
    const data=await res.json();
    const rows=data.customers||[];
    customers=rows.map(r=>({
      id:r.file_number,name:r.full_name,phone:r.phone,email:r.email,country:r.country,
      visa:r.visa_type,rep:r.rep_name||'—',ops:'',
      status:r.status,fee:r.service_fee||0,prepay:r.prepayment||0,
      days:r.last_modified_at?Math.max(0,Math.floor((Date.now()-new Date(r.last_modified_at).getTime())/86400000)):0,
      lastMod:fmtDT(r.last_modified_at),
      apptDate:r.appt_date||'',
      refundStatus:r.refund_status||false,refundAmount:r.refund_amount||0,refundReason:r.refund_reason||'',refundDate:r.refund_date||'',
      callTotal:r.call_total||0,callReached:r.call_reached||0
    }));
    filtered=[...customers];
  }catch(e){
    console.error('loadCustomers hatası:',e);
    customers=[];filtered=[];
  }
}

function initials(n){return(n||'').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();}
function nowStr(){const n=new Date();return n.getDate()+' '+MONTHS[n.getMonth()]+' 2024 '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');return day+' '+MONTHS[parseInt(m)-1]+' '+y;}
function calcR(){const f=parseInt(document.getElementById('nm-fee').value)||0,p=parseInt(document.getElementById('nm-pre').value)||0;document.getElementById('nm-rem').value=Math.max(0,f-p)||'';}

function getVis(){return filtered;}

function toast(msg,type='blue'){
  const wrap=document.getElementById('toast-wrap');
  const t=document.createElement('div');
  const bc={blue:'var(--accent)',green:'var(--green)',red:'var(--red)',amber:'var(--amber)'};
  t.style.cssText='background:#fff;border:1px solid var(--border);border-left:3px solid '+bc[type]+';color:var(--text);padding:11px 16px;border-radius:9px;font-size:12px;font-weight:500;max-width:300px;box-shadow:0 4px 16px rgba(0,0,0,.1)';
  t.textContent=msg;wrap.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},3000);
}

function mapUser(raw,token){
  return {
    username: raw.username, password: raw.password_hash, name: raw.name,
    role: raw.role, color: raw.color || '#2563EB', repName: raw.rep_name,
    id: raw.id, superAdmin: raw.super_admin || false, token
  };
}

let idleTimer=null;
const IDLE_LIMIT_MS=5*60*1000;
function resetIdleTimer(){
  if(idleTimer)clearTimeout(idleTimer);
  idleTimer=setTimeout(()=>{
    if(CU){
      doLogout();
      toast('5 dakika hareketsizlik nedeniyle oturum sonlandırıldı','amber');
    }
  },IDLE_LIMIT_MS);
}
['mousemove','keydown','click','scroll','touchstart'].forEach(evt=>{
  document.addEventListener(evt, ()=>{ if(CU) resetIdleTimer(); });
});

async function restoreSession(){
  const token=localStorage.getItem('vizecrm_token');
  if(!token)return false;
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'validateSession',token})});
    const d=await res.json();
    if(!res.ok||!d.user){localStorage.removeItem('vizecrm_token');return false;}
    CU=mapUser(d.user,token);
    return true;
  }catch(e){
    return false;
  }
}

window.addEventListener('DOMContentLoaded', async function() {
  if (!USE_SUPABASE || SUPABASE_URL.includes('XXXXX')) {
    document.getElementById('supabase-banner').style.display = 'block';
  }
  const restored=await restoreSession();
  if(restored){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    await initApp();
    resetIdleTimer();
  }
});

async function doLogin(){
  const u=document.getElementById('lu').value.trim().toLowerCase(),p=document.getElementById('lp').value;
  let user = null;

  // Sadece Edge Function / Supabase'den giriş — local fallback yok
  try {
    const result = await signInUser(u, p);
    if (result && result.user) {
      user = mapUser(result.user, result.token);
    }
  } catch(e) {
    console.log('Login hatası:', e);
    user = null;
  }

  if(!user){
    document.getElementById('lerr').style.display='block';
    document.getElementById('lp').value='';
    return;
  }
  document.getElementById('lerr').style.display='none';
  CU=user;
  localStorage.setItem('vizecrm_token',CU.token);
  resetIdleTimer();
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  await initApp();
}
function doLogout(){
  CU=null;
  localStorage.removeItem('vizecrm_token');
  if(idleTimer)clearTimeout(idleTimer);
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('lu').value='';
  document.getElementById('lp').value='';
}

async function initApp(){
  const av=document.getElementById('sb-av');
  av.textContent=initials(CU.name);av.style.background=CU.color;av.style.color='#fff';
  document.getElementById('sb-name').textContent=CU.name;
  document.getElementById('sb-role').textContent={management:'Yönetici',sales:'Satış Temsilcisi',ops:'Operasyon Uzmanı',evrak:'Evrak Sorumlusu',randevu:'Randevu Sorumlusu'}[CU.role];
  const isM=CU.role==='management';
  await loadCustomers();
  const refundCount=isM?customers.filter(c=>c.refundStatus).length:0;
  document.getElementById('sb-nav').innerHTML=`
    <div class="sb-sec">Ana Menü</div>
    ${isM?'<button class="nav-item" onclick="showPage(\'dashboard\')"><span class="nav-icon">📊</span> Dashboard</button>':''}
    <button class="nav-item" onclick="showPage(\'customers\')"><span class="nav-icon">👥</span> Müşteriler</button>
    <button class="nav-item" onclick="showPage(\'pipeline\')"><span class="nav-icon">🗂</span> Pipeline</button>
    ${isM?'<div class="sb-sec">Yönetim</div><button class="nav-item" onclick="showPage(\'refunds\')"><span class="nav-icon">↩</span> İadeler'+(refundCount?' <span class="nav-badge">'+refundCount+'</span>':'')+'</button><button class="nav-item" onclick="showPage(\'users\')"><span class="nav-icon">🔐</span> Kullanıcılar</button>':''}
  `;
  document.getElementById('topbar-right').innerHTML=`
    <div class="tb-search"><span>🔍</span><input placeholder="Müşteri ara..." oninput="gSearch(this.value)"></div>
    <button class="btn btn-primary" onclick="openModal()">+ Yeni Müşteri</button>
  `;
  isM?await showPage('dashboard'):await showPage('customers');
}

const PTITLES={dashboard:'Dashboard',customers:'Müşteriler',pipeline:'Pipeline',refunds:'İadeler',users:'Kullanıcılar',account:'Hesap Ayarları'};
async function showPage(p){
  document.getElementById('main-content').innerHTML='';
  document.getElementById('page-title').textContent=PTITLES[p]||p;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelector('[onclick="showPage(\''+p+'\')"]')?.classList.add('active');
  if(p==='dashboard'||p==='customers'||p==='pipeline'||p==='refunds')await loadCustomers();
  await ({dashboard:renderDash,customers:renderCusts,pipeline:renderPipeline,refunds:renderRefunds,users:renderUsers,account:renderAccount})[p]?.();
}
function gSearch(q){const sq=q.toLowerCase();filtered=customers.filter(c=>c.name.toLowerCase().includes(sq)||c.id.toLowerCase().includes(sq)||c.phone.includes(sq));if(document.getElementById('cust-tbody'))renderRows();}

// DASHBOARD
const PRESALE_STAGES=['Yeni Kayıt','Sonra Ara','Ulaşılamıyor','İlgilenmiyor','İletişime Geçildi','Teklif Gönderildi'];
function fmtTL(n){
  n=n||0;
  if(n>=1000000)return '₺'+(n/1000000).toFixed(2)+'M';
  if(n>=1000)return '₺'+Math.round(n/1000)+'K';
  return '₺'+n.toLocaleString('tr-TR');
}
function topGroups(arr,keyFn,limit){
  const map={};
  arr.forEach(c=>{const k=keyFn(c);if(!k)return;map[k]=(map[k]||0)+1;});
  const list=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,limit||4);
  const max=list.length?list[0][1]:1;
  return {list,max};
}
function barsHTML(list,max,colors){
  if(!list.length)return'<div style="font-size:12px;color:var(--text3);padding:8px 0">Henüz veri yok</div>';
  return list.map(([label,count],i)=>`<div class="bar-row"><div class="bar-lbl">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(8,Math.round(count/max*100))}%;background:${colors[i%colors.length]}"></div></div><div class="bar-val">${count} kişi</div></div>`).join('');
}

function renderDash(){
  const all=customers;
  const activeCount=all.filter(c=>c.status!=='Tamamlandı'&&c.status!=='İptal').length;
  const totalCollected=all.reduce((s,c)=>s+(c.prepay||0),0);
  const pendingList=all.filter(c=>(c.fee||0)-(c.prepay||0)>0);
  const pendingTotal=pendingList.reduce((s,c)=>s+((c.fee||0)-(c.prepay||0)),0);
  const cancelledCount=all.filter(c=>c.status==='İptal').length;
  const staleList=all.filter(c=>c.days>7&&c.status!=='Tamamlandı'&&c.status!=='İptal');

  const byCountry=topGroups(all,c=>c.country);
  const byRep=topGroups(all.filter(c=>!PRESALE_STAGES.includes(c.status)&&c.status!=='İptal'),c=>c.rep);
  const byStatus=topGroups(all,c=>c.status);
  const byVisa=topGroups(all,c=>c.visa);

  document.getElementById('main-content').innerHTML=`
  <div class="stats-grid">
    <div class="stat-card c-green"><div class="stat-icon" style="background:var(--green-bg);color:var(--green)">💰</div><div class="stat-val" style="color:var(--green)">${fmtTL(totalCollected)}</div><div class="stat-label">Toplam Tahsilat</div></div>
    <div class="stat-card c-amber"><div class="stat-icon" style="background:var(--amber-bg);color:var(--amber)">⏳</div><div class="stat-val" style="color:var(--amber)">${fmtTL(pendingTotal)}</div><div class="stat-label">Bekleyen Tahsilat</div><div class="stat-trend" style="color:var(--text2)">${pendingList.length} müşteride kalan</div></div>
    <div class="stat-card c-blue"><div class="stat-icon" style="background:var(--accent-l);color:var(--accent)">📂</div><div class="stat-val" style="color:var(--accent)">${activeCount}</div><div class="stat-label">Aktif Başvuru</div></div>
    <div class="stat-card c-red"><div class="stat-icon" style="background:var(--red-bg);color:var(--red)">✕</div><div class="stat-val" style="color:var(--red)">${cancelledCount}</div><div class="stat-label">İptal Edilen</div></div>
  </div>
  ${staleList.length?`<div class="alert alert-red"><div style="display:flex;align-items:center;gap:10px"><span>⚠️</span><div><div style="font-size:13px;font-weight:600;color:var(--red)">${staleList.length} dosya 7+ gün aynı aşamada bekliyor</div><div style="font-size:11px;color:var(--text2);margin-top:1px">Bekleyen dosyalar iade riskini artırır</div></div></div><button class="btn btn-danger btn-sm" onclick="showPage('customers')">Görüntüle →</button></div>`:''}
  <div class="charts-grid">

async function resetPw(un){

async function deleteUser(un){

  if(!cur||!np||!np2){toast('Tüm alanları doldur','red');return;}

  const verifyRes = await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'login',username:CU.username,password:cur})});
  const verifyData = await verifyRes.json();
  if(!verifyRes.ok || !verifyData.user){toast('Mevcut şifre hatalı','red');return;}
  CU.token = verifyData.token; // yeniden giriş doğrulaması yeni bir oturum kartı üretir, güncel tutuyoruz
  localStorage.setItem('vizecrm_token',CU.token);
  // Yeni şifreyi Edge Function ile güncelle
  if(USE_SUPABASE){
    fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'updatePassword',username:CU.username,newPassword:np,token:CU.token})}).then(r=>r.json()).then(d=>{
      if(d.success) toast('✓ Şifre güncellendi — tüm cihazlara yansıdı','green');
      else toast('Hata: '+JSON.stringify(d.error),'red');
    });
  }
  CU.password=np;
  toast('✓ Şifre güncellendi — tüm cihazlara yansıdı','green');['nd-cur','nd-new','nd-new2'].forEach(i=>document.getElementById(i).value='');document.getElementById('pw-msg').style.display='none';}

async function transferCustomer(id){
  const sel = document.getElementById('transfer-rep-'+id);
  const newRep = sel?.value;
  if(!newRep){toast('Lütfen bir temsilci seçin','amber');return;}
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'transferCustomer',customerId:id,newRepUsername:newRep,token:CU.token})});
    const d=await res.json();
    if(!d.success){toast('Hata: '+JSON.stringify(d.error||'Aktarılamadı'),'red');return;}
    await loadCustomers();
    await openPanel(id);
    if(document.getElementById('cust-tbody'))renderRows();
    if(document.getElementById('kanban'))renderPipeline();
    toast('✓ Temsilciye aktarıldı','green');
  }catch(e){
    toast('Bağlantı hatası','red');
  }
}

async function addRefund(id){
  const amt=parseInt(document.getElementById('rf-amt-'+id)?.value)||0;
  const reason=(document.getElementById('rf-reason-'+id)?.value||'').trim();
  if(!amt||!reason){toast('Tutar ve neden zorunludur','red');return;}
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'setRefund',customerId:id,refundAmount:amt,refundReason:reason,token:CU.token})});
    const d=await res.json();
    if(!d.success){toast('Hata: '+JSON.stringify(d.error||'Kaydedilemedi'),'red');return;}
    await loadCustomers();
    await openPanel(id);
    toast('✓ İade kaydedildi','red');
  }catch(e){
    toast('Bağlantı hatası','red');
  }
}

async function updateDocStatus(id,docName,status){

    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'updateDocStatus',customerId:id,docName,docStatus:status,token:CU.token})});
    const d=await res.json();
    if(!d.success){toast('Hata: '+JSON.stringify(d.error||'Kaydedilemedi'),'red');return;}
    toast('✓ '+docName+': '+status,'green');

    toast('Bağlantı hatası','red');
  }
}

async function deleteCustomer(id, name){
  if(!confirm(name+' adlı müşteriyi silmek istediğinizden emin misiniz?\nBu işlem geri alınamaz.')){return;}
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'deleteCustomer',customerId:id,token:CU.token})});
    const d=await res.json();
    if(!d.success){toast('Hata: '+JSON.stringify(d.error||'Silinemedi'),'red');return;}
    await loadCustomers();
    closePanel();
    if(document.getElementById('cust-tbody'))renderRows();
    if(document.getElementById('kanban'))renderPipeline();
    toast('🗑 '+name+' silindi','red');
  }catch(e){
    toast('Bağlantı hatası','red');
  }
}

async function saveAppt(id){
  const v=document.getElementById('ap-'+id)?.value||'';
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'updateAppt',customerId:id,apptDate:v,token:CU.token})});
    const d=await res.json();
    if(!d.success){toast('Hata: '+JSON.stringify(d.error||'Kaydedilemedi'),'red');return;}
    await loadCustomers();
    await openPanel(id);
    if(document.getElementById('cust-tbody'))renderRows();
    if(document.getElementById('kanban'))renderPipeline();
    toast(v?'📅 Randevu: '+fmtDate(v):'Tarih temizlendi','blue');
  }catch(e){
    toast('Bağlantı hatası','red');
  }
}
async function moveStatus(id,ns){
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'updateCustomerStatus',customerId:id,newStatus:ns,token:CU.token})});
    const d=await res.json();
    if(!d.success){toast('Hata: '+JSON.stringify(d.error||'İşlem yapılamadı'),'red');return;}
    await loadCustomers();
    closePanel();
    if(document.getElementById('cust-tbody'))renderRows();
    if(document.getElementById('kanban'))renderPipeline();
    toast('✓ Aşama: '+ns,'green');
  }catch(e){
    toast('Bağlantı hatası','red');
  }
}
async function markPaid(id){
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'markPaid',customerId:id,token:CU.token})});
    const d=await res.json();
    if(!d.success){toast('Hata: '+JSON.stringify(d.error||'İşlem yapılamadı'),'red');return;}
    await loadCustomers();
    await openPanel(id);
    if(document.getElementById('cust-tbody'))renderRows();
    if(document.getElementById('kanban'))renderPipeline();
    toast('✓ Kalan ödeme tahsil edildi','green');
  }catch(e){
    toast('Bağlantı hatası','red');
  }
}
async function addCall(id){
  const r=document.getElementById('cl-r-'+id)?.value,nt=(document.getElementById('cl-n-'+id)?.value||'').trim();
  if(!r)return;
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'addCall',customerId:id,callResult:r,callNote:nt,token:CU.token})});
    const d=await res.json();
    if(!d.success){toast('Hata: '+JSON.stringify(d.error||'Kaydedilemedi'),'red');return;}
    await loadCustomers();
    await openPanel(id);
    if(document.getElementById('cust-tbody'))renderRows();
    toast('📞 Arama kaydedildi — '+RLABELS[r],'blue');
  }catch(e){
    toast('Bağlantı hatası','red');
  }
}
async function saveNote(id){
  const inp=document.getElementById('ni-'+id);const text=(inp?.value||'').trim();if(!text)return;
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'addNote',customerId:id,text,token:CU.token})});
    const d=await res.json();
    if(!d.success){toast('Hata: '+JSON.stringify(d.error||'Kaydedilemedi'),'red');return;}
    inp.value='';
    await loadCustomers();
    await openPanel(id);
    if(document.getElementById('cust-tbody'))renderRows();
    toast('✓ Not kaydedildi','green');
  }catch(e){
    toast('Bağlantı hatası','red');
  }
}
function closePanel(){document.getElementById('overlay').classList.remove('open');document.getElementById('detail-panel').classList.remove('open');}
function openModal(){document.getElementById('add-modal').classList.add('open');}
function closeModal(){document.getElementById('add-modal').classList.remove('open');}

async function addCustomer(){
  const name=document.getElementById('nm-name').value.trim(),phone=document.getElementById('nm-phone').value.trim();
  const email=document.getElementById('nm-email').value.trim();
  if(!name||!phone||!email){toast('Ad, telefon ve e-posta zorunludur','red');return;}
  const fee=parseInt(document.getElementById('nm-fee').value)||0,pre=parseInt(document.getElementById('nm-pre').value)||0;
  const country=document.getElementById('nm-country').value;
  const visa_type=document.getElementById('nm-visa').value;
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'addCustomer',name,phone,email,country,visa_type,fee,prepay:pre,token:CU.token})});
    const d=await res.json();
    if(!d.success){toast('Hata: '+JSON.stringify(d.error||'Eklenemedi'),'red');return;}
    await loadCustomers();
    closeModal();
    if(document.getElementById('cust-tbody'))renderRows();
    if(document.getElementById('kanban'))renderPipeline();
    toast('✓ '+name+' eklendi — '+d.id+' ('+d.assignedTo+'\'a atandı)','green');
    ['nm-name','nm-phone','nm-email','nm-fee','nm-pre','nm-rem'].forEach(i=>{const el=document.getElementById(i);if(el)el.value='';});
  }catch(e){
    toast('Bağlantı hatası','red');
  }
}
</script>
